unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s

# ============================================================================
# Terminal & Color Settings
# ============================================================================
# Enable 256 color and true color support for nvim
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# Fix escape key delay in vim/nvim (eliminates lag when pressing ESC)
set -sg escape-time 0

# ============================================================================
# Mouse & Keyboard Settings
# ============================================================================
set -g mouse on
setw -g mode-keys vi

# ============================================================================
# Window & Pane Settings
# ============================================================================
# Start window numbering at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1
# Start pane numbering at 1 instead of 0
setw -g pane-base-index 1
# Renumber windows sequentially after closing any of them
set -g renumber-windows on
# Increase scrollback history
set -g history-limit 50000

# ============================================================================
# Status Bar Settings
# ============================================================================
set-option -g status-position top
set -g status-left-length 100  # Generous length for session name, client, etc.
set -g status-right-length 100 # Generous length for date, time, hostname

# ============================================================================
# Keybindings - Pane Management
# ============================================================================
# More intuitive split bindings (opens in same directory as current pane)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Also keep the default splits but with current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ============================================================================
# Keybindings - Vim/Tmux Navigation
# ============================================================================
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\S+\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"

# ============================================================================
# Copy Mode Settings (macOS)
# ============================================================================
# Copy to system clipboard using pbcopy (macOS)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"
# Mouse selection also copies to clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
